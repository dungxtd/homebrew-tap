name: Publish release for an app

# Triggered by source app repos via repository_dispatch.
#
# Expected client_payload:
#   app_name:     "nextflix" — must match Casks/<app_name>.rb
#   version:      "1.0.3"
#   tag:          "v1.0.3"
#   source_repo:  "dungxtd/nextflix"
#
# Required secrets:
#   SOURCE_REPO_READ_PAT — Personal Access Token (classic) with `repo` scope
#                          granting read access to private source repos.

on:
  repository_dispatch:
    types: [app-build-finished]
  workflow_dispatch:
    inputs:
      app_name:
        description: App name (must match Casks/<app>.rb)
        required: true
      tag:
        description: Source tag (e.g. v1.0.3)
        required: true
      source_repo:
        description: Source repo (e.g. dungxtd/nextflix)
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.app_name || inputs.app_name }}
      TAG:      ${{ github.event.client_payload.tag      || inputs.tag }}
      VERSION:  ${{ github.event.client_payload.version  || inputs.tag }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || inputs.source_repo }}
    steps:
      - uses: actions/checkout@v5

      - name: Normalize VERSION (strip leading v)
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Download release assets from source repo
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_READ_PAT }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Pull build outputs from the source repo's GitHub Release (quota-free)
          # instead of Actions artifacts.
          gh release download "$TAG" --repo "$SOURCE_REPO" --dir artifacts --clobber
          ls -la artifacts

      - name: Verify artifacts
        run: |
          set -euo pipefail
          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "::error::No assets in source release ${TAG}"
            exit 1
          fi
          ls -la artifacts

      - name: Build latest.json (updater manifest, all platforms)
        run: |
          set -euo pipefail
          VERSIONED_TAG="${APP_NAME}-${TAG}"
          PUB_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSIONED_TAG}"

          PLATFORMS="{}"
          # add <asset-label> <updater platform key>
          add() {
            label="$1"; key="$2"
            zip=$(ls artifacts | grep -E "${APP_NAME}_${label}_.*\.(app\.tar\.gz|msi\.zip|nsis\.zip)$" | head -1 || true)
            sig=$(ls artifacts | grep -E "${APP_NAME}_${label}_.*\.(app\.tar\.gz|msi\.zip|nsis\.zip)\.sig$" | head -1 || true)
            if [ -n "$zip" ] && [ -n "$sig" ]; then
              body=$(tr -d '\n' < "artifacts/${sig}")
              PLATFORMS=$(echo "$PLATFORMS" | jq --arg k "$key" --arg sig "$body" --arg url "${PUB_BASE}/${zip}" \
                '. + {($k): {signature:$sig, url:$url}}')
              echo "latest.json: $key -> $zip"
            else
              echo "latest.json: $key skipped (no updater archive)"
            fi
          }
          add "macos-arm64"   "darwin-aarch64"
          add "macos-x64"     "darwin-x86_64"
          add "windows-x64"   "windows-x86_64"
          add "windows-arm64" "windows-aarch64"

          jq -n \
            --arg v "$VERSION" \
            --arg notes "Release ${TAG} of ${APP_NAME}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{version:$v, notes:$notes, pub_date:$pub_date, platforms:$platforms}' \
            > artifacts/latest.json
          cat artifacts/latest.json

      - name: Create versioned + latest releases, upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSIONED_TAG="${APP_NAME}-${TAG}"
          LATEST_TAG="${APP_NAME}-latest"

          # 1. Versioned (immutable archive)
          if ! gh release view "$VERSIONED_TAG" >/dev/null 2>&1; then
            gh release create "$VERSIONED_TAG" \
              --title "${APP_NAME} ${TAG}" \
              --notes "Release of ${APP_NAME} ${TAG}. Source: ${SOURCE_REPO}." \
              --target main
          fi
          gh release upload "$VERSIONED_TAG" --clobber artifacts/*

          # 2. Moving "latest" release (updater endpoint targets this)
          if gh release view "$LATEST_TAG" >/dev/null 2>&1; then
            for a in $(gh release view "$LATEST_TAG" --json assets --jq '.assets[].name'); do
              gh release delete-asset "$LATEST_TAG" "$a" --yes || true
            done
          else
            gh release create "$LATEST_TAG" \
              --title "${APP_NAME} (latest)" \
              --notes "Moving pointer to most recent ${APP_NAME} release. Updater endpoint: latest.json here." \
              --target main
          fi
          gh release upload "$LATEST_TAG" --clobber artifacts/*

      - name: Bump cask (dual-arch version + sha256)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CASK="Casks/${APP_NAME}.rb"
          if [ ! -f "$CASK" ]; then
            echo "::warning::no cask file $CASK — skipping bump"
            exit 0
          fi
          ARM_DMG=$(ls artifacts | grep -E "${APP_NAME}_macos-arm64_.*\.dmg$" | head -1 || true)
          INTEL_DMG=$(ls artifacts | grep -E "${APP_NAME}_macos-x64_.*\.dmg$" | head -1 || true)
          if [ -z "$ARM_DMG" ] && [ -z "$INTEL_DMG" ]; then
            echo "::warning::no macOS DMGs in artifacts — skipping cask bump"
            exit 0
          fi
          ARM_SHA=""; INTEL_SHA=""
          [ -n "$ARM_DMG" ]   && ARM_SHA=$(shasum -a 256 "artifacts/${ARM_DMG}" | awk '{print $1}')
          [ -n "$INTEL_DMG" ] && INTEL_SHA=$(shasum -a 256 "artifacts/${INTEL_DMG}" | awk '{print $1}')

          # The cask URLs are static (they interpolate #{version}); only the
          # version line and the per-arch sha256 lines change each release.
          # awk tracks which on_arch block each sha256 belongs to.
          awk -v ver="$VERSION" -v armsha="$ARM_SHA" -v intelsha="$INTEL_SHA" '
            /^  version / { print "  version \"" ver "\""; next }
            /on_arm do/   { blk="arm";   print; next }
            /on_intel do/ { blk="intel"; print; next }
            /^    sha256 / {
              if (blk=="arm"   && armsha   != "") { print "    sha256 \"" armsha   "\""; next }
              if (blk=="intel" && intelsha != "") { print "    sha256 \"" intelsha "\""; next }
            }
            { print }
          ' "$CASK" > "$CASK.tmp" && mv "$CASK.tmp" "$CASK"
          cat "$CASK"

          if git diff --quiet "$CASK"; then
            echo "Cask already up-to-date"
            exit 0
          fi
          git config user.email "ci@github.actions"
          git config user.name "release-bot"
          git add "$CASK"
          git commit -m "chore(${APP_NAME}): bump to v${VERSION}"
          git push
